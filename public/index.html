<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Alumnos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body class="bg-light">

    <nav class="navbar navbar-dark bg-dark">
        <div class="container">
            <span class="navbar-brand">Sistema de Alumnos</span>
        </div>
    </nav>

    <div class="container mt-4">

        <div id="alerta" class="alert d-none" role="alert"></div>

        <ul class="nav nav-tabs" id="pestanas" role="tablist">
            <li class="nav-item" role="presentation">
                <button class="nav-link active" id="tab-agregar" data-bs-toggle="tab" data-bs-target="#agregar"
                    type="button">Agregar</button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="tab-listar" data-bs-toggle="tab" data-bs-target="#listar"
                    type="button">Listar</button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="tab-buscarid" data-bs-toggle="tab" data-bs-target="#buscarid"
                    type="button">Buscar por ID</button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="tab-buscarmat" data-bs-toggle="tab" data-bs-target="#buscarmat"
                    type="button">Buscar por Matricula</button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="tab-actualizar" data-bs-toggle="tab" data-bs-target="#actualizar"
                    type="button">Actualizar</button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="tab-borrar" data-bs-toggle="tab" data-bs-target="#borrar"
                    type="button">Borrar</button>
            </li>
        </ul>

        <div class="tab-content border border-top-0 p-4 bg-white" id="contenido">

            <!-- AGREGAR -->
            <div class="tab-pane fade show active" id="agregar" role="tabpanel">
                <h4>Agregar Alumno</h4>
                <form id="formAgregar">
                    <div class="mb-2">
                        <input type="number" class="form-control" id="agMatricula" placeholder="Matricula" required>
                    </div>
                    <div class="mb-2">
                        <input type="text" class="form-control" id="agNombre" placeholder="Nombre completo" required>
                    </div>
                    <div class="mb-2">
                        <input type="text" class="form-control" id="agDomicilio" placeholder="Domicilio">
                    </div>
                    <div class="mb-2">
                        <input type="date" class="form-control" id="agFechanac">
                    </div>
                    <div class="mb-3">
                        <select class="form-select" id="agSexo">
                            <option value="M">Masculino</option>
                            <option value="F">Femenino</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary">Agregar</button>
                </form>
                <div id="resultAgregar" class="mt-3"></div>
            </div>

            <!-- listar -->
            <div class="tab-pane fade" id="listar" role="tabpanel">
                <h4>Listar Todos los Alumnos</h4>
                <button id="btnListar" class="btn btn-success mb-3">Obtener listado</button>
                <div id="resultListar" class="table-responsive"></div>
            </div>

            <!-- buscar x id -->
            <div class="tab-pane fade" id="buscarid" role="tabpanel">
                <h4>Buscar por ID</h4>
                <div class="input-group mb-3" style="max-width:400px;">
                    <input type="number" class="form-control" id="buscarId" placeholder="ID del alumno">
                    <button class="btn btn-info text-white" id="btnBuscarId">Buscar</button>
                </div>
                <div id="resultBuscarId"></div>
            </div>

            <!-- buscar matricula -->
            <div class="tab-pane fade" id="buscarmat" role="tabpanel">
                <h4>Buscar por Matricula</h4>
                <div class="input-group mb-3" style="max-width:400px;">
                    <input type="text" class="form-control" id="buscarMat" placeholder="Matricula">
                    <button class="btn btn-warning" id="btnBuscarMat">Buscar</button>
                </div>
                <div id="resultBuscarMat"></div>
            </div>

            <!-- actializar -->
            <div class="tab-pane fade" id="actualizar" role="tabpanel">
                <h4>Actualizar Alumno</h4>
                <form id="formActualizar">
                    <div class="mb-2">
                        <input type="number" class="form-control" id="actId" placeholder="ID del alumno" required>
                    </div>
                    <div class="mb-2">
                        <input type="number" class="form-control" id="actMatricula" placeholder="Nueva matricula">
                    </div>
                    <div class="mb-2">
                        <input type="text" class="form-control" id="actNombre" placeholder="Nuevo nombre">
                    </div>
                    <div class="mb-2">
                        <input type="text" class="form-control" id="actDomicilio" placeholder="Nuevo domicilio">
                    </div>
                    <div class="mb-2">
                        <input type="date" class="form-control" id="actFechanac">
                    </div>
                    <div class="mb-3">
                        <select class="form-select" id="actSexo">
                            <option value="">-- Sexo --</option>
                            <option value="M">Masculino</option>
                            <option value="F">Femenino</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-secondary">Actualizar</button>
                </form>
                <div id="resultActualizar" class="mt-3"></div>
            </div>

            <!-- borrar -->
            <div class="tab-pane fade" id="borrar" role="tabpanel">
                <h4>Borrar Alumno</h4>
                <div class="input-group mb-3" style="max-width:400px;">
                    <input type="number" class="form-control" id="borrarId" placeholder="ID del alumno">
                    <button class="btn btn-danger" id="btnBorrar">Eliminar</button>
                </div>
                <div id="resultBorrar"></div>
            </div>

        </div>
    </div>

    <footer class="bg-dark text-white text-center py-3 mt-4">
        <p class="mb-0">Todos los derechos reservados 2026 Fernando Cristerna</p>
    </footer>

    <script src="script.js"></script>
</body>

</html>
